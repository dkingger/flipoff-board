server {
    listen 80;
    server_name 192.168.87.132;

    root /var/www/flipoff;
    index index.html;


    location /api/messages {
        proxy_pass http://127.0.0.1:8123/messages;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
